<!-- Codex of Armenian Kings (Top 20) - CK3 Tier-List Forge -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Armenian Kings Tier List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;900&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cinzel+Decorative:wght@700;900&family=Noto+Sans+Armenian:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e0b07;--bg2:#15100a;--panel:#1c150d;--panel2:#241a0f;
    --ink:#efe3c8;--ink-dim:#b7a47e;--gold:#c9a24b;--gold-bright:#e9c976;
    --crimson:#8c2b2b;--line:#3a2c18;--shadow:0 18px 40px rgba(0,0,0,.55);
    --dip:#5aa0d0;--mar:#cf4438;--ste:#e0b13c;--int:#9b76c4;--lea:#46b48a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%, #241a0f 0%, transparent 60%),
      repeating-linear-gradient(0deg, rgba(0,0,0,.18) 0 2px, transparent 2px 4px),
      linear-gradient(180deg,var(--bg) 0%, var(--bg2) 100%);
    color:var(--ink);font-family:"EB Garamond",Georgia,serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{position:relative;z-index:1;max-width:920px;margin:0 auto;padding:18px 12px 28px}
  header.codex{text-align:center;padding:22px 16px 18px;margin-bottom:16px;
    border:1px solid var(--line);border-radius:14px;
    background:radial-gradient(800px 200px at 50% 0%, rgba(201,162,75,.10), transparent 70%),
      linear-gradient(180deg,var(--panel2),var(--panel));
    box-shadow:var(--shadow);position:relative;overflow:hidden}
  header.codex::after{content:"";position:absolute;left:50%;bottom:0;transform:translateX(-50%);
    width:60%;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
  .crest{width:60px;height:60px;margin:0 auto 6px;display:block;filter:drop-shadow(0 4px 6px rgba(0,0,0,.6))}
  h1{font-family:"Cinzel Decorative","Cinzel",serif;font-weight:900;
    font-size:clamp(24px,5vw,40px);letter-spacing:.04em;margin:.1em 0 .05em;
    color:var(--gold-bright);text-shadow:0 2px 0 #2a1d0c,0 0 24px rgba(201,162,75,.25)}
  .sub{font-family:"Cinzel",serif;letter-spacing:.30em;text-transform:uppercase;
    font-size:11.5px;color:var(--ink-dim);margin-top:4px}
  .tagline{color:var(--ink-dim);font-style:italic;max-width:760px;margin:12px auto 0;font-size:14.5px;line-height:1.5}
  .legend{display:flex;flex-wrap:wrap;gap:10px 22px;justify-content:center;
    margin:14px auto 6px;font-size:13px;color:var(--ink-dim)}
  .legend b{color:var(--ink)}
  .lk{display:inline-flex;align-items:center;gap:8px}
  .lk img.ck3ico{width:22px;height:22px}
  .scale-note{text-align:center;color:var(--ink-dim);font-size:12.5px;margin:4px auto 0;font-style:italic}
  .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:center;
    margin:16px 0 12px;padding:12px;border:1px solid var(--line);border-radius:12px;
    background:linear-gradient(180deg,var(--panel),var(--bg2))}
  .controls .grp{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  label.lbl{font-family:"Cinzel",serif;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-dim)}
  select,button.btn{font-family:"Cinzel",serif;font-size:12px;letter-spacing:.06em;
    background:linear-gradient(180deg,#2c2010,#1c150d);color:var(--ink);
    border:1px solid var(--gold);border-radius:8px;padding:8px 12px;cursor:pointer;transition:.15s}
  button.btn:hover,select:hover{background:linear-gradient(180deg,#3a2a14,#241a0f);box-shadow:0 0 0 1px var(--gold-bright) inset}
  button.btn.gold{border-color:var(--gold-bright);color:var(--gold-bright)}
  button.btn.warn{border-color:var(--crimson);color:#e7b3a8}
  .tiers{display:flex;flex-direction:column;gap:10px;margin-top:8px}
  .tier{display:grid;grid-template-columns:78px 1fr;align-items:stretch;
    border:1px solid var(--line);border-radius:12px;overflow:visible;
    background:linear-gradient(180deg,var(--panel),#120d07);transition:.15s}
  .tier.dragover{box-shadow:0 0 0 2px var(--gold-bright) inset, var(--shadow)}
  .tier .lab{display:flex;align-items:center;justify-content:center;align-self:stretch;
    font-family:"Cinzel Decorative",serif;font-weight:900;font-size:34px;color:#1a120a;
    text-shadow:0 1px 0 rgba(255,255,255,.25)}
  .tier .drop{display:flex;flex-wrap:wrap;gap:8px;padding:9px;align-content:flex-start}
  .tS .lab{background:linear-gradient(180deg,#ffd86b,#e0a93c)}
  .tA .lab{background:linear-gradient(180deg,#ffb06b,#e07c2f)}
  .tB .lab{background:linear-gradient(180deg,#ffe07a,#d8c24a)}
  .tC .lab{background:linear-gradient(180deg,#bfe07a,#8fb84a)}
  .tD .lab{background:linear-gradient(180deg,#9ec8e0,#5f93b8)}
  .tF .lab{background:linear-gradient(180deg,#d99,#b86)}
  .pool-head{display:flex;align-items:center;gap:12px;margin:24px 0 10px}
  .pool-head h2{font-family:"Cinzel",serif;color:var(--gold-bright);letter-spacing:.12em;
    text-transform:uppercase;font-size:16px;margin:0}
  .pool-head .rule{flex:1;height:1px;background:linear-gradient(90deg,var(--gold),transparent)}
  .pool{display:flex;flex-wrap:wrap;gap:11px;padding:11px;border:1px dashed var(--line);
    border-radius:12px;min-height:120px;background:rgba(0,0,0,.18)}
  .pool.dragover{box-shadow:0 0 0 2px var(--gold-bright) inset}
  .card{
    width:calc(33.333% - 6px);flex:0 0 calc(33.333% - 6px);
    border:1px solid var(--line);border-radius:8px;overflow:hidden;
    background:linear-gradient(180deg,var(--panel2),#140e08);cursor:grab;
    box-shadow:0 3px 8px rgba(0,0,0,.32);transition:transform .12s, box-shadow .12s;
    position:relative;animation:rise .5s both}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .card:hover{transform:translateY(-1px);box-shadow:0 6px 14px rgba(0,0,0,.45),0 0 0 1px var(--gold) inset}
  .card.dragging{opacity:.45}
  .card-main{
    display:flex;flex-direction:row;align-items:flex-start;gap:6px;
    padding:5px 5px 4px;cursor:pointer}
  .card-main:hover .name{color:var(--gold-bright)}
  .card-left{
    width:92px;flex-shrink:0;display:flex;flex-direction:column;gap:4px;min-width:0}
  .card-right{
    flex:1;min-width:0;display:flex;flex-direction:column;justify-content:flex-start}
  .portrait{position:relative;width:100%;height:68px;overflow:hidden;border-radius:6px;
    border:1px solid var(--line);
    background:radial-gradient(80px 60px at 50% 35%, #2a1f12, #0e0a06)}
  .portrait .med{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:48px;height:48px}
  .portrait img.photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
    opacity:0;transition:opacity .55s ease;filter:sepia(.22) saturate(.9) contrast(1.04) brightness(.98)}
  .portrait img.photo.loaded{opacity:1}
  .portrait .vig{position:absolute;inset:0;pointer-events:none;
    box-shadow:inset 0 0 14px rgba(0,0,0,.55), inset 0 0 0 1px rgba(201,162,75,.25)}
  .ident{min-width:0;line-height:1.12}
  .name{font-family:"Cinzel",serif;font-weight:700;font-size:10px;line-height:1.1;color:var(--ink);transition:color .12s}
  .name-hy{font-family:"Noto Sans Armenian",sans-serif;font-size:9px;line-height:1.15;color:var(--gold);margin-top:1px}
  .dyn-line{font-size:7.5px;color:var(--ink-dim);margin-top:2px;line-height:1.2}
  .dyn{font-family:"Cinzel",serif;letter-spacing:.03em;text-transform:uppercase}
  .dyn-hy{font-family:"Noto Sans Armenian",sans-serif}
  .reign{font-size:7.5px;color:var(--ink-dim);margin-top:1px;letter-spacing:.02em}
  .stats{padding:0;display:flex;flex-direction:column;gap:3px}
  .stat{display:grid;grid-template-columns:28px 34px 12px;align-items:center;gap:3px;min-height:28px}
  .stat .ico{display:flex;align-items:center;justify-content:center;width:28px;height:28px;flex-shrink:0}
  .stats .stat .ico img.ck3ico{width:28px;height:28px;max-width:none;max-height:none;object-fit:contain;display:block}
  .bar{height:2px;border-radius:1px;background:rgba(255,255,255,.07);overflow:hidden;width:100%;max-width:34px}
  .bar i{display:block;height:100%;max-width:100%;border-radius:1px}
  .stat .v{font-size:7.5px;text-align:right;color:var(--ink-dim);font-variant-numeric:tabular-nums;line-height:1}
  .total{display:flex;justify-content:flex-end;align-items:center;gap:4px;padding:2px 0 0;margin-top:2px;
    border-top:1px solid rgba(255,255,255,.08);font-size:7.5px;line-height:1;color:var(--ink-dim)}
  .total b{color:var(--gold-bright);font-family:"Cinzel",serif;font-size:8px}
  .tierpick{display:flex;gap:2px;padding:2px 5px 4px;border-top:1px solid var(--line);cursor:default}
  .tierpick button{flex:1;font-family:"Cinzel",serif;font-weight:700;font-size:8px;
    border:1px solid var(--line);background:#1a130b;color:var(--ink-dim);border-radius:5px;
    padding:3px 0;cursor:pointer;transition:.12s}
  .tierpick button:hover{color:var(--ink);border-color:var(--gold)}
  .tierpick button.on{color:#0e0b07}
  .tierpick button.S.on{background:#e0a93c}.tierpick button.A.on{background:#e07c2f}
  .tierpick button.B.on{background:#d8c24a}.tierpick button.C.on{background:#8fb84a}
  .tierpick button.D.on{background:#5f93b8}.tierpick button.F.on{background:#b86}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;
    justify-content:center;z-index:50;padding:20px}
  .modal.show{display:flex}
  .modal .box{max-width:600px;width:100%;background:var(--panel2);border:1px solid var(--gold);
    border-radius:12px;padding:18px;box-shadow:var(--shadow)}
  .modal h3{font-family:"Cinzel",serif;color:var(--gold-bright);margin:0 0 10px}
  .modal textarea{width:100%;height:300px;background:#120d07;color:var(--ink);border:1px solid var(--line);
    border-radius:8px;padding:10px;font-family:"EB Garamond",serif;font-size:13px;resize:vertical}
  .modal .row{display:flex;gap:10px;justify-content:flex-end;margin-top:10px}
  @media (max-width:720px){
    .card{width:calc(50% - 4px);flex:0 0 calc(50% - 4px)}
  }
  @media (max-width:480px){
    .card{width:100%;flex:0 0 100%}
    .tier{grid-template-columns:54px 1fr}.tier .lab{font-size:26px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="codex">
    <svg class="crest" viewBox="0 0 64 64" aria-hidden="true">
      <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#e9c976"/><stop offset="1" stop-color="#a9802f"/></linearGradient></defs>
      <path fill="url(#g)" d="M32 4c6 6 14 8 22 8-1 22-9 36-22 48C19 48 11 34 10 12c8 0 16-2 22-8z"/>
      <path fill="#8c2b2b" d="M32 12c4 4 9 5 14 5-1 15-6 25-14 33-8-8-13-18-14-33 5 0 10-1 14-5z"/>
      <path fill="#e9c976" d="M32 20l3 6 6 1-4 4 1 6-6-3-6 3 1-6-4-4 6-1z"/>
    </svg>
    <h1>Armenian Kings Tier List</h1>
  </header>

  <div class="legend" id="legend"></div>
  <div class="scale-note">CK3 scale: ~8 average &middot; 12+ skilled &middot; 16+ great &middot; 18-20 legendary. Ratings are interpretive - overrule them in your own tiering.</div>

  <div class="controls">
    <div class="grp">
      <label class="lbl" for="sort">Sort pool</label>
      <select id="sort">
        <option value="total">By Total</option>
        <option value="dip">By Diplomacy</option>
        <option value="mar">By Martial</option>
        <option value="ste">By Stewardship</option>
        <option value="int">By Intrigue</option>
        <option value="lea">By Learning</option>
        <option value="chron">Chronological</option>
      </select>
    </div>
    <div class="grp">
      <button class="btn gold" id="auto">Auto-seed by Total</button>
      <button class="btn" id="export">Export ranking</button>
      <button class="btn warn" id="reset">Reset all</button>
    </div>
  </div>

  <div class="tiers" id="tiers"></div>

  <div class="pool-head"><h2>The Royal Pool</h2><span class="rule"></span></div>
  <div class="pool" id="pool" data-tier="pool"></div>

</div>

<div class="modal" id="modal">
  <div class="box">
    <h3>Your Tier List</h3>
    <textarea id="exporttext" readonly></textarea>
    <div class="row">
      <button class="btn" id="copybtn">Copy to clipboard</button>
      <button class="btn gold" id="closebtn">Close</button>
    </div>
  </div>
</div>
<script>
// ---------- Real CK3 attribute icons (CK3 Wiki) + drawn fallbacks ----------
const ICON_URL = {
  dip:"https://ck3.paradoxwikis.com/images/a/af/Diplomacy.png",
  mar:"https://ck3.paradoxwikis.com/images/3/3f/Icon_commander_advantage.png",
  ste:"https://ck3.paradoxwikis.com/images/a/a3/Icon_tax_collector.png",
  int:"https://ck3.paradoxwikis.com/images/0/0b/Intrigue.png",
  lea:"https://ck3.paradoxwikis.com/images/2/22/Learning.png"
};
const HEX = {dip:"#5aa0d0",mar:"#cf4438",ste:"#e0b13c",int:"#9b76c4",lea:"#46b48a"};
const GLYPH = {
  dip:c=>`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='${c}'><path d='M2.5 13.2c3 .3 5-1.4 7.2-1.4 1 0 1.8.4 2.7.6L21 8l-1.3 4.6c-.8 2.9-3.6 5.2-7.2 5.6l.9 2.6-2.7-1.1-1.9 1.6-.8-2.7-3.9 1 1.3-3.4c-.8-.6-1.5-1.4-1.9-2.6z'/><circle cx='18.4' cy='9.2' r='.9' fill='#120d07'/></svg>`,
  mar:c=>`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='${c}'><path d='M4.3 3.2 3 4.5l9.1 9.1 1.3-1.3zM6 18.4l-1.9.3.3 1.6-1 1 .9.9 1-1 1.6.3.3-1.9 2.6-2.6-1.3-1.3zM19.7 3.2 21 4.5l-9.1 9.1-1.3-1.3zM18 18.4l1.9.3-.3 1.6 1 1-.9.9-1-1-1.6.3-.3-1.9-2.6-2.6 1.3-1.3z'/></svg>`,
  ste:c=>`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='${c}'><circle cx='9' cy='10' r='5.4'/><circle cx='15.4' cy='14.4' r='5' fill-opacity='.82'/></svg>`,
  int:c=>`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='${c}'><path d='M11 2.5h2l-.5 10.5h-1z'/><path d='M7.8 13h8.4v1.9H7.8z'/><path d='M11 14.9h2v3.4l-1 2.2-1-2.2z'/></svg>`,
  lea:c=>`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='${c}'><path d='M12 6.2C9.4 4.6 6.3 4.4 3 5.2v13.2c3.3-.8 6.4-.6 9 1 2.6-1.6 5.7-1.8 9-1V5.2c-3.3-.8-6.4-.6-9 1z'/></svg>`
};
const fb = key => "data:image/svg+xml,"+encodeURIComponent(GLYPH[key](HEX[key]));

const DYN = {
  Artaxiad:{c:"#7a45ad",label:"Artaxiad",labelHy:"Արտաշեսյան"},
  Arsacid:{c:"#a83232",label:"Arsacid",labelHy:"Արշակունի"},
  Bagratid:{c:"#2f5ea0",label:"Bagratid",labelHy:"Բագրատունի"},
  Vaspurakan:{c:"#1f9684",label:"Artsruni",labelHy:"Արծրունի"},
  Rubenid:{c:"#c43c22",label:"Rubenid",labelHy:"Ռուբինյան"},
  Hethumid:{c:"#368a52",label:"Hethumid",labelHy:"Հեթումյան"},
  Lusignan:{c:"#4278b0",label:"Lusignan",labelHy:"\u053c\u0578\u0582\u057d\u056b\u0576\u0575\u0561\u0576"}
};

const IMG = "/images/opinions/kings/";
// stats:[Diplomacy,Martial,Stewardship,Intrigue,Learning]; img = local portrait
const KINGS = [
 {id:1,anchor:"king-artaxias-i",name:"Artaxias I",nameHy:"\u0531\u0580\u057f\u0561\u0577\u0565\u057d \u0531",epi:"Artashes the Lawgiver",reign:"c. 190-160 BC",dyn:"Artaxiad",mono:"A\u00b7I",img:IMG+"Artashes_I.png",stats:[13,15,16,10,13],bio:"Founded the Artaxiad dynasty and the capital Artaxata (reputedly laid out by the exiled Hannibal). Set bilingual boundary stones across a unified Armenia."},
 {id:2,anchor:"king-tigranes-ii",name:"Tigranes II",nameHy:"\u054f\u056b\u0563\u0580\u0561\u0576 \u0532",epi:"The Great \u00b7 King of Kings",reign:"95-55 BC",dyn:"Artaxiad",mono:"T\u00b7II",img:IMG+"Tigran_II.jpg",stats:[17,18,17,14,14],bio:"Forged the largest empire in Armenian history - Caspian to the Mediterranean - and built Tigranocerta. The apex of Armenian power."},
 {id:3,anchor:"king-artavasdes-ii",name:"Artavasdes II",nameHy:"\u0531\u0580\u057f\u0561\u057e\u0561\u0566\u0564 \u0532",epi:"The Playwright-King",reign:"55-34 BC",dyn:"Artaxiad",mono:"A\u00b7II",img:IMG+"Artavazd_II.png",stats:[14,11,13,15,18],bio:"Wrote Greek tragedies and histories; balanced Rome and Parthia until Antony betrayed him. Paraded in golden chains and executed by Cleopatra."},
 {id:4,anchor:"king-tiridates-i",name:"Tiridates I",nameHy:"\u054d\u0580\u0564\u0561\u057f \u0531",epi:"Crowned by Nero",reign:"63-88 AD",dyn:"Arsacid",mono:"T\u00b7I",img:IMG+"Trdat_I.jpg",stats:[16,13,13,12,14],bio:"Founder of Arsacid Armenia and a Zoroastrian magus; travelled overland to Rome with 3,000 retainers for a spectacular coronation by Nero."},
 {id:5,anchor:"king-tiridates-iii",name:"Tiridates III",nameHy:"\u054d\u0580\u0564\u0561\u057f \u0533",epi:"The Great \u00b7 First Christian King",reign:"c. 298-330 AD",dyn:"Arsacid",mono:"T\u00b7III",img:IMG+"Trdat_III.jpg",stats:[14,16,14,11,13],bio:"Made Armenia the first Christian state (301), converted by Gregory the Illuminator. Famed in tradition for legendary strength."},
 {id:6,anchor:"king-arshak-ii",name:"Arshak II",nameHy:"\u0531\u0580\u0577\u0561\u056f \u0532",epi:"The Defiant",reign:"c. 350-368 AD",dyn:"Arsacid",mono:"Ar\u00b7II",img:IMG+"Arshak_II.jpg",stats:[10,16,11,13,10],bio:"Waged a long war against Shapur II, founded the refuge-city Arshakavan, and died in the Castle of Oblivion. Pavstos Buzand devotes a whole book to him."},
 {id:7,anchor:"king-pap",name:"Pap",nameHy:"\u054a\u0561\u057a",epi:"The Restorer",reign:"370-374 AD",dyn:"Arsacid",mono:"Pap",img:IMG+"Pap.jpg",stats:[12,13,12,16,9],bio:"Clawed back Armenian autonomy and curbed Church power; cunning to the last - murdered by the Romans at a banquet, as narrated by Ammianus Marcellinus."},
 {id:8,anchor:"king-vramshapuh",name:"Vramshapuh",nameHy:"\u054e\u0580\u0561\u0574\u0577\u0561\u057a\u0578\u0582\u0570",epi:"Patron of the Alphabet",reign:"389-417 AD",dyn:"Arsacid",mono:"Vr",img:IMG+"Vramshapuh.jpg",stats:[13,9,13,8,18],bio:"During his reign Mesrop Mashtots created the Armenian alphabet (c. 405) - a civilisational landmark recorded by Koryun."},
 {id:9,anchor:"king-ashot-i",name:"Ashot I",nameHy:"\u0531\u0577\u0578\u057f \u0531",epi:"The Great \u00b7 Restorer of the Crown",reign:"884-890",dyn:"Bagratid",mono:"As\u00b7I",img:IMG+"Ashot_I.png",stats:[16,14,14,11,12],bio:"Revived the Armenian crown after centuries of vassalage, recognised as king by both the Abbasid Caliph and the Byzantine Emperor."},

 {id:11,anchor:"king-ashot-ii",name:"Ashot II",nameHy:"\u0531\u0577\u0578\u057f \u0532",epi:"The Iron",reign:"914-929",dyn:"Bagratid",mono:"As\u00b7II",img:IMG+"Ashot_II.jpeg",stats:[12,17,11,11,10],bio:"Drove out the Sajid armies in a brutal counter-offensive and was recognised as Shahanshah, King of Kings of Armenia."},

const SKILL=[
 {key:"dip",name:"Diplomacy",color:"var(--dip)"},
 {key:"mar",name:"Martial",color:"var(--mar)"},
 {key:"ste",name:"Stewardship",color:"var(--ste)"},
 {key:"int",name:"Intrigue",color:"var(--int)"},
 {key:"lea",name:"Learning",color:"var(--lea)"}
];
const TIERS=["S","A","B","C","D","F"];
const total=k=>k.stats.reduce((a,b)=>a+b,0);
const kingById=id=>KINGS.find(k=>k.id===id);
const lists={pool:[]};
TIERS.forEach(t=>{lists[t]=[]});

function tierOf(id){
  for(const t of TIERS)if(lists[t].includes(id))return t;
  return "pool";
}

function removeFromLists(id){
  TIERS.forEach(t=>{const i=lists[t].indexOf(id);if(i>=0)lists[t].splice(i,1);});
  const p=lists.pool.indexOf(id);if(p>=0)lists.pool.splice(p,1);
}

function getInsertIndex(dropEl,x,y){
  const cards=[...dropEl.querySelectorAll(".card:not(.dragging)")];
  if(!cards.length)return 0;
  for(let i=0;i<cards.length;i++){
    const r=cards[i].getBoundingClientRect();
    if(y<r.top+4)return i;
    if(y<=r.bottom&&x<r.left+r.width/2)return i;
  }
  return cards.length;
}

function seedByTotal(){
  TIERS.forEach(t=>{lists[t]=[];});
  lists.pool=[];
  KINGS.forEach(k=>{
    const t=total(k)>=78?"S":total(k)>=70?"A":total(k)>=62?"B":total(k)>=54?"C":total(k)>=46?"D":"F";
    lists[t].push(k.id);
  });
  TIERS.forEach(t=>{
    lists[t].sort((a,b)=>total(kingById(b))-total(kingById(a)));
  });
}
seedByTotal();

document.getElementById("legend").innerHTML = SKILL.map(s=>
  `<span class="lk"><img class="ck3ico" data-skill="${s.key}" alt="${s.name}">${s.name}</span>`).join("");

function medallion(k){
  const c=DYN[k.dyn].c;
  return `<svg class="med" viewBox="0 0 60 60">
    <defs>
      <radialGradient id="f${k.id}" cx="50%" cy="36%" r="72%"><stop offset="0" stop-color="${c}"/><stop offset="1" stop-color="#120d07"/></radialGradient>
      <linearGradient id="r${k.id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e9c976"/><stop offset="1" stop-color="#9a7327"/></linearGradient>
    </defs>
    <circle cx="30" cy="30" r="28" fill="url(#r${k.id})"/>
    <circle cx="30" cy="30" r="24" fill="url(#f${k.id})" stroke="#120d07" stroke-width="1"/>
    <text x="30" y="35" text-anchor="middle" font-family="Cinzel, serif" font-weight="700" font-size="${k.mono.length>3?12:15}" fill="#f3e6c2">${k.mono}</text>
  </svg>`;
}
function statRow(k){
  return SKILL.map((s,i)=>{
    const v=k.stats[i],pct=Math.round(v/20*100);
    return `<div class="stat"><span class="ico"><img class="ck3ico" width="28" height="28" data-skill="${s.key}" alt="${s.name}"></span>
      <span class="bar"><i style="width:${pct}%;background:${s.color}"></i></span>
      <span class="v">${v}</span></div>`;
  }).join("");
}
function tierButtons(k){
  return `<div class="tierpick">`+TIERS.map(t=>
    `<button class="${t} ${tierOf(k.id)===t?'on':''}" data-id="${k.id}" data-t="${t}">${t}</button>`).join("")+`</div>`;
}
function cardHTML(k){
  const d=DYN[k.dyn];
  return `<div class="card" draggable="true" data-id="${k.id}" data-anchor="${k.anchor}">
    <div class="card-main" title="View king profile">
      <div class="card-left">
        <div class="portrait">
          ${medallion(k)}
          <img class="photo" alt="${k.name}" data-id="${k.id}">
          <span class="vig"></span>
        </div>
        <div class="ident">
          <div class="name">${k.name}</div>
          <div class="name-hy">${k.nameHy}</div>
          <div class="dyn-line"><span class="dyn">${d.label}</span> · <span class="dyn-hy">${d.labelHy}</span></div>
          <div class="reign">${k.reign}</div>
        </div>
      </div>
      <div class="card-right">
        <div class="stats">${statRow(k)}</div>
        <div class="total"><span>Total</span><b>${total(k)}</b></div>
      </div>
    </div>
    ${tierButtons(k)}
  </div>`;
}

function jumpToProfile(anchor){
  if(!anchor)return;
  const home=window.parent!==window?window.parent:window;
  try{
    const el=home.document.getElementById(anchor);
    if(el){
      const top=el.getBoundingClientRect().top+home.pageYOffset-88;
      home.scrollTo({top:Math.max(0,top),behavior:"smooth"});
      el.classList.remove("akt-king--flash");
      void el.offsetWidth;
      el.classList.add("akt-king--flash");
      home.setTimeout(()=>el.classList.remove("akt-king--flash"),1200);
      return;
    }
  }catch(err){}
  try{
    home.postMessage({type:"akt-scroll",anchor:anchor},"*");
    if(home.location)home.location.hash=anchor;
  }catch(err2){}
}

const tiersEl=document.getElementById("tiers");
TIERS.forEach(t=>{const row=document.createElement("div");row.className="tier t"+t;
  row.innerHTML=`<div class="lab">${t}</div><div class="drop" data-tier="${t}"></div>`;tiersEl.appendChild(row);});
const poolEl=document.getElementById("pool");
let sortMode="total";
function sortPoolIds(ids){
  const a=[...ids];
  if(sortMode==="chron")a.sort((x,y)=>x-y);
  else if(sortMode==="total")a.sort((x,y)=>total(kingById(y))-total(kingById(x)));
  else{const i=SKILL.findIndex(s=>s.key===sortMode);a.sort((x,y)=>kingById(y).stats[i]-kingById(x).stats[i]);}
  return a;
}
function poolIdsForRender(){return [...lists.pool];}

function applyIcons(scope){
  (scope||document).querySelectorAll("img.ck3ico").forEach(img=>{
    if(img.dataset.done)return; img.dataset.done="1";
    const k=img.dataset.skill;
    img.onerror=function(){this.onerror=null;this.src=fb(k);};
    img.src=ICON_URL[k];
  });
}

function applyPortraits(){
  document.querySelectorAll("img.photo").forEach(img=>{
    if(img.dataset.set)return; img.dataset.set="1";
    const id=+img.dataset.id, k=KINGS.find(x=>x.id===id);
    if(!k||!k.img)return;
    img.onload=()=>{img.classList.add("loaded");postHeight();};
    img.onerror=()=>{img.classList.remove("loaded");};
    img.src=k.img;
  });
}
function render(){
  document.querySelectorAll(".drop").forEach(d=>d.innerHTML="");poolEl.innerHTML="";
  TIERS.forEach(t=>{
    const drop=document.querySelector(`.drop[data-tier="${t}"]`);
    lists[t].forEach(id=>{
      const k=kingById(id);
      if(k)drop.insertAdjacentHTML("beforeend",cardHTML(k));
    });
  });
  poolIdsForRender().forEach(id=>{
    const k=kingById(id);
    if(k)poolEl.insertAdjacentHTML("beforeend",cardHTML(k));
  });
  bindCards();applyPortraits();applyIcons();postHeight();
}

let dragId=null;
let didDrag=false;
function bindCards(){
  document.querySelectorAll(".card").forEach(c=>{
    c.addEventListener("dragstart",e=>{
      if(e.target.closest(".tierpick")){e.preventDefault();return;}
      didDrag=false;
      dragId=+c.dataset.id;
      c.classList.add("dragging");
      e.dataTransfer.effectAllowed="move";
      e.dataTransfer.setData("text/plain",String(dragId));
    });
    c.addEventListener("drag",()=>{didDrag=true;});
    c.addEventListener("dragend",()=>{
      dragId=null;
      document.querySelectorAll(".card").forEach(x=>x.classList.remove("dragging"));
      setTimeout(()=>{didDrag=false;},150);
    });
    c.addEventListener("click",e=>{
      if(e.target.closest(".tierpick button"))return;
      if(didDrag)return;
      jumpToProfile(c.dataset.anchor);
    });
  });
  document.querySelectorAll(".tierpick button").forEach(b=>{
    b.addEventListener("click",e=>{
      e.stopPropagation();
      const id=+b.dataset.id,t=b.dataset.t;
      removeFromLists(id);
      lists[t].push(id);
      render();
    });
  });
}
function setupZones(){
  document.querySelectorAll(".drop, .pool").forEach(z=>{
    z.addEventListener("dragover",e=>{
      e.preventDefault();
      e.dataTransfer.dropEffect="move";
      if(z.classList.contains("pool"))poolEl.classList.add("dragover");
      else z.closest(".tier").classList.add("dragover");
    });
    z.addEventListener("dragleave",()=>{z.closest(".tier")?.classList.remove("dragover");poolEl.classList.remove("dragover");});
    z.addEventListener("drop",e=>{
      e.preventDefault();
      const t=z.dataset.tier;
      const id=dragId!=null?dragId:+(e.dataTransfer.getData("text/plain")||0);
      if(!id)return;
      removeFromLists(id);
      const idx=getInsertIndex(z,e.clientX,e.clientY);
      lists[t].splice(idx,0,id);
      dragId=null;
      render();
      document.querySelectorAll(".dragover").forEach(x=>x.classList.remove("dragover"));
    });
  });
}

document.getElementById("sort").addEventListener("change",e=>{
  sortMode=e.target.value;
  lists.pool=sortPoolIds(lists.pool);
  render();
});
document.getElementById("reset").addEventListener("click",()=>{seedByTotal();render();});
document.getElementById("auto").addEventListener("click",()=>{seedByTotal();render();});
document.getElementById("export").addEventListener("click",()=>{
  let out="ARMENIAN KING TIER LIST\n=======================\n";
  TIERS.forEach(t=>{
    if(!lists[t].length)return;
    out+=`\n[${t}]  `+lists[t].map(id=>{
      const k=kingById(id);
      return k?k.name+` (${k.epi.split("\u00b7")[0].trim()})`:"";
    }).filter(Boolean).join("  \u00b7  ")+"\n";
  });
  if(lists.pool.length)out+="\n[Unranked]  "+lists.pool.map(id=>kingById(id)?.name).filter(Boolean).join("  \u00b7  ")+"\n";
  document.getElementById("exporttext").value=out;document.getElementById("modal").classList.add("show");});
document.getElementById("closebtn").addEventListener("click",()=>document.getElementById("modal").classList.remove("show"));
document.getElementById("modal").addEventListener("click",e=>{if(e.target.id==="modal")e.target.classList.remove("show");});
document.getElementById("copybtn").addEventListener("click",()=>{const ta=document.getElementById("exporttext");ta.select();
  try{document.execCommand("copy");const b=document.getElementById("copybtn");b.textContent="Copied!";setTimeout(()=>b.textContent="Copy to clipboard",1400);}catch(e){}});

// ---------- auto-resize when embedded in an iframe ----------
let _ht=0;
function postHeight(){
  const wrap=document.querySelector(".wrap");
  const h=wrap?Math.ceil(wrap.getBoundingClientRect().height):Math.ceil(document.body.scrollHeight);
  if(!h||h===_ht)return; _ht=h;
  if(window.parent!==window)window.parent.postMessage({type:"akt-height",height:h},"*");
}
window.addEventListener("resize",postHeight);
window.addEventListener("load",postHeight);

setupZones();
applyIcons();
render();
</script>
</body>
</html>
